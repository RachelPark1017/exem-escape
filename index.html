<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EXEM 사무실 탈출 — 핵심가치 방탈출 게임</title>
<style>
  @font-face {
    font-family: 'Unica 77 LL';
    src: url('Unica77LLTT-Light.ttf') format('truetype');
    font-weight: 300;
    font-style: normal;
  }
  @font-face {
    font-family: 'Unica 77 LL';
    src: url('Unica77LLTT-Bold.ttf') format('truetype');
    font-weight: 700;
    font-style: normal;
  }
</style>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f0f1a;
    --surface: #1a1a2e;
    --surface2: #22223b;
    --border: #333355;
    --blue: #40E2FF;
    --blue-light: #73EEFF;
    --gold: #f59e0b;
    --green: #10b981;
    --red: #ef4444;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --white: #ffffff;
    --glass-bg: rgba(26, 26, 46, 0.65);
    --glass-border: rgba(255, 255, 255, 0.08);
    --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    --glass-blur: blur(16px);
    --glow-blue: 0 0 20px rgba(64, 226, 255, 0.3);
    --glow-green: 0 0 20px rgba(16, 185, 129, 0.3);
    --glow-gold: 0 0 20px rgba(245, 158, 11, 0.3);
    --transition-fast: 0.2s ease;
    --transition-med: 0.4s ease;
    --transition-slow: 0.6s ease;
  }

  body {
    font-family: 'Pretendard', 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── INTRO SCREEN ── */
  #intro {
    width: 100%;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }


  .btn-start {
    background: var(--blue);
    color: #0a0a1a;
    border: none;
    border-radius: 10px;
    padding: 1rem 3rem;
    font-size: 1.1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(64,226,255,0.4);
    letter-spacing: 0.05em;
  }

  .btn-start:hover {
    background: var(--blue-light);
    transform: translateY(-2px);
    box-shadow: 0 0 30px rgba(64,226,255,0.6);
  }

  /* ── GAME SCREEN ── */
  #game {
    display: none;
    width: 100%;
    max-width: 680px;
    padding: 1rem;
    flex-direction: column;
    gap: 1rem;
    padding-bottom: 4rem;
  }

  /* Header */
  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.75rem 1rem;
    background: var(--surface);
    border-radius: 10px;
    border: 1px solid var(--border);
    position: sticky;
    top: 0.5rem;
    z-index: 10;
  }

  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 0.5rem;
    font-size: 1.3rem;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }

  .timer-wrap.warning { color: var(--gold); }
  .timer-wrap.danger { color: var(--red); animation: pulse 1s infinite; }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .stage-dots {
    display: flex;
    gap: 0.4rem;
    align-items: center;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--border);
    transition: all 0.3s;
  }

  .dot.done { background: var(--green); box-shadow: 0 0 6px var(--green); }
  .dot.active { background: var(--gold); box-shadow: 0 0 8px var(--gold); }

  /* Room card */
  .room-card, .quiz-card {
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow);
    border-radius: 16px;
    padding: 1.5rem;
    animation: slideIn 0.3s ease;
  }

  .room-card {
    overflow: hidden;
  }

  .room-header {
    padding: 1rem 1.25rem 0.75rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
    background: rgba(64,226,255,0.08);
  }

  .room-icon { font-size: 1.8rem; }

  .room-title {
    font-size: 1.15rem;
    font-weight: 700;
    color: var(--white);
  }

  .room-location {
    font-size: 0.8rem;
    color: var(--blue-light);
    margin-top: 0.1rem;
  }

  .room-story {
    padding: 1.25rem;
    font-size: 0.95rem;
    line-height: 1.75;
    color: var(--muted);
    white-space: pre-line;
  }

  .hint-box {
    margin: 0 1.25rem 1.25rem;
    padding: 0.6rem 0.9rem;
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.3);
    border-radius: 8px;
    font-size: 0.82rem;
    color: var(--gold);
  }

  /* Quiz card */

  .quiz-progress {
    font-size: 0.78rem;
    color: var(--muted);
    margin-bottom: 0.75rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .quiz-progress-bar {
    flex: 1;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .quiz-progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 2px;
    transition: width 0.4s;
  }

  .quiz-type-badge {
    display: inline-block;
    padding: 0.15rem 0.5rem;
    border-radius: 4px;
    font-size: 0.72rem;
    font-weight: 600;
    margin-bottom: 0.75rem;
  }

  .badge-ox { background: rgba(16,185,129,0.15); color: var(--green); border: 1px solid rgba(16,185,129,0.3); }
  .badge-choice { background: rgba(64,226,255,0.15); color: var(--blue-light); border: 1px solid rgba(64,226,255,0.3); }
  .badge-fill { background: rgba(245,158,11,0.15); color: var(--gold); border: 1px solid rgba(245,158,11,0.3); }
  .badge-scenario { background: rgba(139,92,246,0.15); color: #a78bfa; border: 1px solid rgba(139,92,246,0.3); }

  .quiz-question {
    font-size: 1rem;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 1.25rem;
    white-space: pre-line;
  }

  /* OX buttons */
  .ox-buttons {
    display: flex;
    gap: 0.75rem;
  }

  .ox-btn {
    flex: 1;
    padding: 1rem;
    border-radius: 10px;
    border: 2px solid var(--border);
    background: transparent;
    font-size: 2rem;
    cursor: pointer;
    transition: all 0.2s;
    color: var(--text);
  }

  .ox-btn:hover:not(:disabled) { border-color: var(--blue); transform: scale(1.03); }
  .ox-btn.selected-correct { border-color: var(--green); background: rgba(16,185,129,0.12); }
  .ox-btn.selected-wrong { border-color: var(--red); background: rgba(239,68,68,0.12); }
  .ox-btn:disabled { cursor: not-allowed; opacity: 0.6; }

  /* Choice options */
  .options-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .option-btn {
    display: block;
    width: 100%;
    padding: 0.85rem 1rem;
    border-radius: 10px;
    border: 1px solid var(--glass-border);
    background: rgba(34, 34, 59, 0.6);
    backdrop-filter: blur(8px);
    color: var(--text);
    font-size: 0.9rem;
    text-align: left;
    cursor: pointer;
    transition: all var(--transition-fast);
    line-height: 1.5;
  }

  .option-btn:hover:not(:disabled) {
    background: rgba(64, 226, 255, 0.12);
    border-color: var(--blue);
    transform: translateX(4px) scale(1.01);
    box-shadow: var(--glow-blue);
  }

  .option-btn.correct {
    border-color: var(--green);
    background: rgba(16,185,129,0.12);
    color: #6ee7b7;
  }

  .option-btn.wrong {
    border-color: var(--red);
    background: rgba(239,68,68,0.12);
    color: #fca5a5;
  }

  .option-btn:disabled { cursor: not-allowed; }

  /* Fill input */
  .fill-wrap {
    display: flex;
    gap: 0.5rem;
  }

  .fill-input {
    flex: 1;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.04);
    color: var(--white);
    font-size: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .fill-input:focus { border-color: var(--blue); }
  .fill-input.correct { border-color: var(--green); background: rgba(16,185,129,0.08); }
  .fill-input.wrong { border-color: var(--red); background: rgba(239,68,68,0.08); }

  .btn-submit {
    padding: 0.75rem 1.25rem;
    border-radius: 8px;
    border: none;
    background: var(--blue);
    color: #0a0a1a;
    font-weight: 600;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-submit:hover:not(:disabled) { background: var(--blue-light); }
  .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Feedback */
  .feedback {
    margin-top: 1rem;
    padding: 0.75rem 1rem;
    border-radius: 8px;
    font-size: 0.9rem;
    line-height: 1.6;
    display: none;
  }

  .feedback.correct {
    background: rgba(16,185,129,0.1);
    border: 1px solid rgba(16,185,129,0.3);
    color: #6ee7b7;
    display: block;
  }

  .feedback.wrong {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    display: block;
  }

  .btn-next {
    display: none;
    margin-top: 1rem;
    width: 100%;
    padding: 0.85rem;
    border-radius: 8px;
    border: none;
    background: var(--blue);
    color: #0a0a1a;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-next:hover { background: var(--blue-light); }
  .btn-next.visible { display: block; }

  .btn-retry {
    display: none;
    margin-top: 1rem;
    width: 100%;
    padding: 0.85rem;
    border-radius: 8px;
    border: none;
    background: #2a1a1a;
    color: #fca5a5;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    border: 1px solid rgba(239,68,68,0.3);
  }

  .btn-retry:hover { background: #3a2020; }
  .btn-retry.visible { display: block; }

  /* Stage clear */
  .stage-clear {
    display: none;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-radius: 16px;
    padding: 1.5rem;
    text-align: center;
    box-shadow: var(--glow-green);
  }

  .stage-clear.visible { display: block; }

  .clear-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

  .clear-message {
    font-size: 1rem;
    color: var(--green);
    font-weight: 600;
    margin-bottom: 0.75rem;
    line-height: 1.6;
  }

  .clear-next-hint {
    font-size: 0.85rem;
    color: var(--gold);
    background: rgba(245,158,11,0.08);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: 8px;
    padding: 0.6rem 0.9rem;
    margin-bottom: 1rem;
  }

  .btn-next-stage {
    padding: 0.85rem 2rem;
    border-radius: 8px;
    border: none;
    background: var(--green);
    color: white;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-next-stage:hover { filter: brightness(1.1); transform: translateY(-1px); }

  /* ── ENDING SCREEN ── */
  #ending {
    display: none;
    width: 100%;
    min-height: 100vh;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    text-align: center;
    background: radial-gradient(ellipse at 50% 30%, #0d2a1a 0%, #0f0f1a 70%);
  }

  .ending-icon { font-size: 4rem; margin-bottom: 1rem; }

  .ending-title {
    font-size: 2rem;
    font-weight: 900;
    color: var(--gold);
    margin-bottom: 0.5rem;
    text-shadow: 0 0 20px rgba(245,158,11,0.5);
  }

  .ending-sub {
    font-size: 1rem;
    color: var(--green);
    margin-bottom: 2rem;
    font-weight: 600;
  }

  .ending-stats {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 2rem;
    justify-content: center;
    flex-wrap: wrap;
  }

  .stat-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1rem 1.5rem;
    text-align: center;
  }

  .stat-value {
    font-size: 1.8rem;
    font-weight: 800;
    color: var(--white);
  }

  .stat-label {
    font-size: 0.78rem;
    color: var(--muted);
    margin-top: 0.2rem;
  }

  .ending-message {
    max-width: 520px;
    font-size: 0.95rem;
    line-height: 1.8;
    color: var(--muted);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 2rem;
  }

  .values-summary {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 0.75rem;
  }

  .value-tag {
    background: rgba(64,226,255,0.15);
    border: 1px solid var(--blue);
    border-radius: 20px;
    padding: 0.25rem 0.75rem;
    font-size: 0.82rem;
    color: var(--blue-light);
  }

  .btn-restart {
    padding: 0.85rem 2.5rem;
    border-radius: 10px;
    border: none;
    background: var(--blue);
    color: #0a0a1a;
    font-weight: 700;
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-restart:hover { background: var(--blue-light); transform: translateY(-2px); }

  /* Score display */
  .score-display {
    font-size: 0.85rem;
    color: var(--muted);
    background: var(--surface2);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
  }

  .score-display span { color: var(--gold); font-weight: 700; }

  /* Office minimap */
  .office-map {
    display: flex;
    align-items: center;
    gap: 0;
    overflow-x: auto;
    flex-shrink: 0;
  }

  .map-room {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.15rem;
    padding: 0.3rem 0.5rem;
    border-radius: 6px;
    opacity: 0.3;
    transition: all 0.4s;
    font-size: 0.65rem;
    color: var(--muted);
    flex-shrink: 0;
    white-space: nowrap;
  }

  .map-room .map-icon { font-size: 1rem; }
  .map-room.visited { opacity: 0.5; }
  .map-room.current {
    opacity: 1;
    background: rgba(64,226,255,0.12);
    border: 1px solid var(--blue);
    color: var(--blue);
  }

  .map-arrow {
    color: var(--border);
    font-size: 0.7rem;
    flex-shrink: 0;
    padding: 0 2px;
    transition: color 0.4s;
  }

  .map-arrow.passed { color: var(--blue); }

  /* Stage transition */
  @keyframes stageSlideIn {
    from { opacity: 0; transform: translateX(50px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes stageSlideOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(-50px); }
  }

  .stage-entering { animation: stageSlideIn 0.35s ease forwards; }
  .stage-leaving  { animation: stageSlideOut 0.22s ease forwards; pointer-events: none; }

  /* Room flicker overlay */
  .room-flicker {
    position: fixed;
    inset: 0;
    background: #000;
    pointer-events: none;
    z-index: 999;
    animation: flickerOut 0.6s ease-out forwards;
  }

  @keyframes flickerOut {
    0%   { opacity: 0.7; }
    30%  { opacity: 0.2; }
    55%  { opacity: 0.5; }
    80%  { opacity: 0.1; }
    100% { opacity: 0; }
  }

  /* ── VISUAL EFFECTS ── */
  @keyframes shake {
    0%, 100% { transform: translateX(0) rotate(0); }
    15%  { transform: translateX(-9px) rotate(-0.6deg); }
    30%  { transform: translateX(9px) rotate(0.6deg); }
    45%  { transform: translateX(-6px); }
    60%  { transform: translateX(6px); }
    75%  { transform: translateX(-3px); }
  }

  @keyframes confettiFall {
    0%   { transform: translateY(0) rotate(0deg); opacity: 1; }
    80%  { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  @keyframes correctFlash {
    0%   { box-shadow: 0 0 0 0 rgba(16,185,129,0.7); }
    50%  { box-shadow: 0 0 0 14px rgba(16,185,129,0); }
    100% { box-shadow: 0 0 0 0 rgba(16,185,129,0); }
  }

  .shake-anim { animation: shake 0.42s ease; }
  .correct-flash { animation: correctFlash 0.6s ease; }

  /* Animations */
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .quiz-card, .room-card, .stage-clear {
    animation: slideIn 0.3s ease;
  }

  /* Typography — Unica One for headings/UI, Pretendard for body */
  .room-title,
  .quiz-badge,
  .stage-clear-title,
  .btn-start,
  .btn-submit,
  .btn-next,
  .btn-retry,
  .btn-next-stage,
  .btn-restart,
  .timer-wrap,
  .timer-circle .timer-text,
  .value-tag {
    font-family: 'Unica 77 LL', 'Pretendard', sans-serif;
    letter-spacing: 0.03em;
  }

  /* Circular Timer */
  .timer-circle {
    position: relative;
    width: 56px;
    height: 56px;
    flex-shrink: 0;
  }

  .timer-circle svg {
    transform: rotate(-90deg);
    width: 56px;
    height: 56px;
  }

  .timer-circle .track {
    fill: none;
    stroke: var(--surface2);
    stroke-width: 4;
  }

  .timer-circle .progress {
    fill: none;
    stroke: var(--blue);
    stroke-width: 4;
    stroke-linecap: round;
    transition: stroke-dashoffset 1s linear, stroke 0.5s ease;
  }

  .timer-circle .progress.warning { stroke: var(--gold); }
  .timer-circle .progress.danger { stroke: var(--red); }

  .timer-circle .timer-text {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Unica 77 LL', monospace;
    font-size: 0.72rem;
    font-weight: 700;
    color: var(--text);
  }

  /* Overall progress (5 stages) */
  .overall-progress {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .progress-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--surface2);
    border: 1px solid var(--border);
    transition: all var(--transition-med);
  }

  .progress-dot.completed {
    background: var(--green);
    border-color: var(--green);
    box-shadow: var(--glow-green);
  }

  .progress-dot.current {
    background: var(--blue);
    border-color: var(--blue);
    box-shadow: var(--glow-blue);
    transform: scale(1.3);
  }

  /* 3D Stage Transition */
  #stageContent {
    perspective: 800px;
    transform-style: preserve-3d;
  }

  @keyframes doorOpen {
    0%   { clip-path: inset(0 50% 0 50%); opacity: 0; }
    40%  { clip-path: inset(0 20% 0 20%); opacity: 0.6; }
    100% { clip-path: inset(0 0 0 0); opacity: 1; }
  }

  @keyframes roomZoomIn {
    0%   { transform: perspective(800px) translateZ(0); opacity: 1; }
    100% { transform: perspective(800px) translateZ(200px); opacity: 0; }
  }

  @keyframes roomZoomOut {
    0%   { transform: perspective(800px) translateZ(-200px); opacity: 0; }
    100% { transform: perspective(800px) translateZ(0); opacity: 1; }
  }

  .stage-door-open { animation: doorOpen 0.8s ease-out forwards; }
  .stage-zoom-in   { animation: roomZoomIn 0.4s ease-in forwards; pointer-events: none; }
  .stage-zoom-out  { animation: roomZoomOut 0.5s ease-out forwards; }

  /* ── CINEMATIC SYSTEM ── */
  .cinematic-overlay {
    position: fixed;
    inset: 0;
    z-index: 200;
    background: #000;
    overflow: hidden;
  }

  .cinematic-scene {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
    opacity: 0;
  }

  .cinematic-bg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    z-index: 0;
  }

  .cinematic-bg-overlay {
    position: absolute;
    inset: 0;
    z-index: 1;
  }

  .cinematic-bg-overlay.dark {
    background: rgba(0, 0, 0, 0.6);
  }

  .cinematic-bg-overlay.darker {
    background: rgba(0, 0, 0, 0.75);
  }

  .cinematic-vignette {
    position: absolute;
    inset: 0;
    box-shadow: inset 0 0 150px rgba(0,0,0,0.7);
    z-index: 2;
    pointer-events: none;
  }

  .cinematic-content {
    position: relative;
    z-index: 3;
    max-width: 560px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
  }

  .cinematic-text {
    font-size: 1.15rem;
    line-height: 2;
    color: var(--muted);
    font-style: italic;
  }

  .cinematic-text .highlight {
    color: var(--blue-light);
    font-style: normal;
    font-weight: 600;
  }

  .cinematic-text-line {
    opacity: 0;
    transform: translateY(12px);
  }

  .cinematic-text-line.visible {
    opacity: 1;
    transform: translateY(0);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  .cinematic-skip {
    position: fixed;
    top: 1.5rem;
    right: 1.5rem;
    z-index: 210;
    padding: 0.5rem 1.2rem;
    border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.5);
    color: var(--muted);
    font-size: 0.82rem;
    cursor: pointer;
    transition: all var(--transition-fast);
    backdrop-filter: blur(8px);
  }

  .cinematic-skip:hover {
    border-color: var(--blue);
    color: var(--blue);
  }

  .cinematic-dots {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 210;
    display: flex;
    gap: 0.5rem;
  }

  .cinematic-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: rgba(255,255,255,0.25);
    transition: all 0.3s;
  }

  .cinematic-dot.active {
    background: var(--blue);
    box-shadow: 0 0 8px var(--blue);
  }

  .cinematic-dot.done {
    background: rgba(255,255,255,0.5);
  }

  .cinematic-logo {
    height: 80px;
    animation: glowPulse 3s ease-in-out infinite;
  }

  .cinematic-start-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .cinematic-stage-list {
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .cinematic-stage-icon {
    width: 48px;
    height: 48px;
    border-radius: 12px;
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.4rem;
    opacity: 0;
    transform: scale(0.5);
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .cinematic-stage-icon.visible {
    opacity: 1;
    transform: scale(1);
  }

  /* ── TRANSITION ANIMATIONS ── */
  @keyframes cin-fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes cin-fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  @keyframes cin-slideLeft {
    from { opacity: 0; transform: translateX(100px); }
    to   { opacity: 1; transform: translateX(0); }
  }

  @keyframes cin-slideLeftOut {
    from { opacity: 1; transform: translateX(0); }
    to   { opacity: 0; transform: translateX(-100px); }
  }

  @keyframes cin-zoomIn {
    from { opacity: 0; transform: scale(1.3); }
    to   { opacity: 1; transform: scale(1); }
  }

  @keyframes cin-zoomInOut {
    from { opacity: 1; transform: scale(1); }
    to   { opacity: 0; transform: scale(0.8); }
  }

  @keyframes cin-blur {
    from { opacity: 0; filter: blur(20px); }
    to   { opacity: 1; filter: blur(0); }
  }

  @keyframes cin-blurOut {
    from { opacity: 1; filter: blur(0); }
    to   { opacity: 0; filter: blur(20px); }
  }

  @keyframes cin-glitch {
    0%   { opacity: 0; transform: translate(0); filter: hue-rotate(0deg); }
    10%  { opacity: 0.8; transform: translate(-5px, 3px); filter: hue-rotate(90deg); }
    20%  { opacity: 0.6; transform: translate(5px, -2px); filter: hue-rotate(180deg); }
    30%  { opacity: 0.9; transform: translate(-3px, 0); filter: hue-rotate(270deg); }
    40%  { opacity: 0.7; transform: translate(2px, 2px); filter: hue-rotate(0deg); }
    50%  { opacity: 1; transform: translate(0); filter: hue-rotate(0deg); }
    100% { opacity: 1; transform: translate(0); filter: hue-rotate(0deg); }
  }

  @keyframes cin-shake {
    0%, 100% { transform: translateX(0); }
    10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
    20%, 40%, 60%, 80% { transform: translateX(4px); }
  }

  /* Particles canvas */
  .cinematic-particles {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes fadeOut {
    from { opacity: 1; }
    to   { opacity: 0; }
  }

  @keyframes glowPulse {
    0%, 100% { filter: drop-shadow(0 0 8px rgba(64, 226, 255, 0.4)); }
    50%      { filter: drop-shadow(0 0 24px rgba(64, 226, 255, 0.8)); }
  }

  @keyframes btnPulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(64, 226, 255, 0.4); }
    50%      { box-shadow: 0 0 0 12px rgba(64, 226, 255, 0); }
  }

  .btn-start {
    animation: btnPulse 2s ease-in-out infinite;
  }

  /* Enhanced quiz feedback */
  @keyframes unlockPulse {
    0%   { transform: scale(1); }
    30%  { transform: scale(1.15); }
    60%  { transform: scale(0.95); }
    100% { transform: scale(1); }
  }

  @keyframes greenFlash {
    0%   { background: transparent; }
    30%  { background: rgba(16, 185, 129, 0.15); }
    100% { background: transparent; }
  }

  @keyframes redFlash {
    0%   { background: transparent; }
    30%  { background: rgba(239, 68, 68, 0.12); }
    100% { background: transparent; }
  }

  .unlock-anim { animation: unlockPulse 0.5s ease; }
  .screen-green-flash { animation: greenFlash 0.6s ease; }
  .screen-red-flash   { animation: redFlash 0.5s ease; }

  /* Discovery popup */
  .discovery-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 200;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--gold);
    border-radius: 16px;
    padding: 1.5rem 2.5rem;
    text-align: center;
    animation: popIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    box-shadow: var(--glow-gold);
  }

  @keyframes popIn {
    to { transform: translate(-50%, -50%) scale(1); }
  }

  @keyframes popOut {
    from { transform: translate(-50%, -50%) scale(1); opacity: 1; }
    to   { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
  }

  .discovery-popup .discovery-icon { font-size: 2rem; margin-bottom: 0.5rem; }
  .discovery-popup .discovery-text { color: var(--gold); font-weight: 700; font-size: 1rem; }

  /* Sparkle particles */
  .sparkle {
    position: fixed;
    width: 6px;
    height: 6px;
    background: var(--gold);
    border-radius: 50%;
    pointer-events: none;
    z-index: 201;
    animation: sparkleFade 0.8s ease-out forwards;
  }

  @keyframes sparkleFade {
    0%   { transform: scale(1) translate(0, 0); opacity: 1; }
    100% { transform: scale(0) translate(var(--tx), var(--ty)); opacity: 0; }
  }

  /* Hint System */
  .hint-btn-float {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    z-index: 50;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    border: none;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 1.5rem;
    cursor: pointer;
    transition: all var(--transition-fast);
    box-shadow: var(--glow-gold);
    display: none;
  }

  .hint-btn-float.visible { display: flex; align-items: center; justify-content: center; }
  .hint-btn-float:hover { transform: scale(1.1); }
  .hint-btn-float:active { transform: scale(0.95); }

  .hint-badge {
    position: absolute;
    top: -4px;
    right: -4px;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: var(--red);
    color: white;
    font-size: 0.65rem;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .hint-panel {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 60;
    background: var(--surface);
    border-top: 1px solid var(--gold);
    border-radius: 16px 16px 0 0;
    padding: 1.5rem;
    transform: translateY(100%);
    transition: transform 0.3s ease;
    max-height: 50vh;
    overflow-y: auto;
  }

  .hint-panel.open { transform: translateY(0); }

  .hint-panel-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 1rem;
  }

  .hint-panel-title {
    font-weight: 700;
    color: var(--gold);
    font-size: 1rem;
  }

  .hint-close {
    background: none;
    border: none;
    color: var(--muted);
    font-size: 1.2rem;
    cursor: pointer;
  }

  .hint-item {
    padding: 0.75rem 1rem;
    border-radius: 10px;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .hint-item.available {
    background: rgba(245, 158, 11, 0.08);
    border: 1px solid rgba(245, 158, 11, 0.2);
    color: var(--text);
  }

  .hint-item.available:hover {
    background: rgba(245, 158, 11, 0.15);
  }

  .hint-item.revealed {
    background: rgba(245, 158, 11, 0.05);
    border: 1px solid rgba(245, 158, 11, 0.1);
    color: var(--muted);
    cursor: default;
  }

  .hint-item.locked {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--border);
    cursor: not-allowed;
  }

  .hint-cost {
    font-size: 0.75rem;
    margin-top: 0.25rem;
  }

  .hint-cost.free { color: var(--green); }
  .hint-cost.paid { color: var(--red); }

  @keyframes scoreDeduct {
    0%   { opacity: 1; transform: translateY(0); }
    100% { opacity: 0; transform: translateY(-30px); }
  }

  .score-deduct {
    position: fixed;
    z-index: 100;
    color: var(--red);
    font-weight: 700;
    font-size: 1rem;
    pointer-events: none;
    animation: scoreDeduct 1s ease-out forwards;
  }

  /* ── MATCH PUZZLE ── */
  .match-container {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 0.5rem;
    align-items: start;
  }

  .match-column {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .match-item {
    padding: 0.7rem 1rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 0.85rem;
    cursor: grab;
    transition: all var(--transition-fast);
    user-select: none;
    touch-action: none;
  }

  .match-item:active { cursor: grabbing; }
  .match-item.dragging { opacity: 0.5; transform: scale(0.95); }
  .match-item.drag-over { border-color: var(--blue); background: rgba(64, 226, 255, 0.1); }
  .match-item.matched-correct { border-color: var(--green); background: rgba(16, 185, 129, 0.1); }
  .match-item.matched-wrong { border-color: var(--red); background: rgba(239, 68, 68, 0.1); }

  .match-arrow-col {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 1.2rem;
    padding: 0;
  }

  .match-arrow {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 42px;
    padding: 0.7rem 0;
  }

  .match-slot {
    padding: 0.7rem 1rem;
    border-radius: 10px;
    border: 2px dashed var(--border);
    background: transparent;
    min-height: 42px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    color: var(--muted);
    transition: all var(--transition-fast);
  }

  .match-slot.drag-over { border-color: var(--blue); background: rgba(64, 226, 255, 0.05); }
  .match-slot.filled { border-style: solid; }

  .btn-match-submit {
    grid-column: 1 / -1;
    margin-top: 0.5rem;
    padding: 0.85rem;
    border-radius: 8px;
    border: none;
    background: var(--blue);
    color: #0a0a1a;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  /* ── ORDER PUZZLE ── */
  .order-list {
    display: flex;
    flex-direction: column;
    gap: 0.5rem;
  }

  .order-item {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 1rem;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: var(--surface2);
    cursor: grab;
    touch-action: none;
    user-select: none;
    transition: all var(--transition-fast);
  }

  .order-item:active { cursor: grabbing; }
  .order-item.dragging { opacity: 0.5; }
  .order-item.drag-over { border-color: var(--blue); transform: translateY(2px); }

  .order-number {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    font-weight: 700;
    color: var(--muted);
    flex-shrink: 0;
  }

  .order-text { font-size: 0.85rem; color: var(--text); }

  .btn-order-submit {
    margin-top: 0.75rem;
    padding: 0.85rem;
    border-radius: 8px;
    border: none;
    background: var(--blue);
    color: #0a0a1a;
    font-weight: 700;
    width: 100%;
    cursor: pointer;
  }

  /* ── DIAL PUZZLE ── */
  .dial-container {
    display: flex;
    gap: 0.5rem;
    justify-content: center;
    align-items: center;
    margin: 1rem 0;
  }

  .dial-wheel {
    width: 56px;
    height: 160px;
    border-radius: 12px;
    border: 2px solid var(--border);
    background: var(--surface);
    overflow: hidden;
    position: relative;
    touch-action: none;
  }

  .dial-track {
    position: absolute;
    width: 100%;
    transition: transform 0.2s ease;
  }

  .dial-char {
    width: 100%;
    height: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--muted);
    font-family: 'Unica 77 LL', monospace;
  }

  .dial-char.active { color: var(--blue); font-size: 1.5rem; }

  .dial-indicator {
    position: absolute;
    left: 0;
    right: 0;
    top: 50%;
    transform: translateY(-50%);
    height: 42px;
    border-top: 2px solid var(--blue);
    border-bottom: 2px solid var(--blue);
    background: rgba(64, 226, 255, 0.05);
    pointer-events: none;
  }

  .dial-arrow {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all var(--transition-fast);
  }

  .dial-arrow:hover { border-color: var(--blue); color: var(--blue); }

  .dial-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
  }

  .btn-dial-submit {
    margin-top: 1rem;
    padding: 0.85rem 2rem;
    border-radius: 8px;
    border: none;
    background: var(--blue);
    color: #0a0a1a;
    font-weight: 700;
    cursor: pointer;
    width: 100%;
  }

  /* Tension effects */
  .tension-text {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    color: var(--red);
    font-size: 0.85rem;
    font-style: italic;
    opacity: 0;
    animation: tensionFade 3s ease forwards;
    pointer-events: none;
    text-align: center;
    max-width: 300px;
  }

  @keyframes tensionFade {
    0%   { opacity: 0; transform: translateX(-50%) translateY(10px); }
    20%  { opacity: 1; transform: translateX(-50%) translateY(0); }
    80%  { opacity: 1; }
    100% { opacity: 0; }
  }

  .vignette-overlay {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 2;
    box-shadow: inset 0 0 100px rgba(0,0,0,0.5);
  }

/* Grade badge */
.grade-badge {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.5rem;
  font-weight: 900;
  font-family: 'Unica 77 LL', sans-serif;
  margin: 0 auto 1rem;
  border: 3px solid;
}

.grade-S { color: #f59e0b; border-color: #f59e0b; box-shadow: 0 0 30px rgba(245,158,11,0.5); background: rgba(245,158,11,0.1); }
.grade-A { color: #10b981; border-color: #10b981; box-shadow: 0 0 20px rgba(16,185,129,0.3); background: rgba(16,185,129,0.1); }
.grade-B { color: #40E2FF; border-color: #40E2FF; box-shadow: 0 0 15px rgba(64,226,255,0.3); background: rgba(64,226,255,0.1); }
.grade-C { color: #94a3b8; border-color: #94a3b8; background: rgba(148,163,184,0.1); }

.stage-graph { width: 100%; max-width: 400px; margin: 1.5rem auto; }

.stage-bar-row { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.5rem; }

.stage-bar-label { font-size: 0.75rem; color: var(--muted); width: 90px; text-align: right; flex-shrink: 0; white-space: nowrap; }

.stage-bar-track { flex: 1; height: 12px; background: var(--surface2); border-radius: 6px; overflow: hidden; }

.stage-bar-fill { height: 100%; border-radius: 6px; transition: width 1s ease; background: linear-gradient(90deg, var(--blue), var(--green)); }

.stage-bar-pct { font-size: 0.75rem; color: var(--text); width: 35px; font-weight: 700; }

.epilogue {
  margin-top: 1.5rem;
  padding: 1.5rem;
  background: var(--glass-bg);
  backdrop-filter: var(--glass-blur);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  max-width: 520px;
  font-size: 0.9rem;
  line-height: 1.8;
  color: var(--muted);
  font-style: italic;
}

.special-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 1rem;
  border-radius: 20px;
  font-size: 0.85rem;
  font-weight: 700;
  margin-top: 1rem;
}

.badge-solo {
  background: rgba(245,158,11,0.15);
  border: 1px solid var(--gold);
  color: var(--gold);
}

/* ── TOGGLE PUZZLE ── */
.toggle-list {
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}

.toggle-row {
  display: flex;
  align-items: center;
  gap: 0.75rem;
  padding: 0.75rem 1rem;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--surface2);
  transition: all var(--transition-fast);
}

.toggle-text {
  flex: 1;
  font-size: 0.85rem;
  color: var(--text);
  line-height: 1.5;
}

.toggle-switch {
  width: 52px;
  height: 28px;
  border-radius: 14px;
  border: none;
  background: rgba(239, 68, 68, 0.3);
  cursor: pointer;
  position: relative;
  transition: all 0.3s ease;
  flex-shrink: 0;
}

.toggle-switch::after {
  content: '✕';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 24px;
  height: 24px;
  border-radius: 50%;
  background: var(--red);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.6rem;
  color: white;
  transition: all 0.3s ease;
}

.toggle-switch.on {
  background: rgba(16, 185, 129, 0.3);
}

.toggle-switch.on::after {
  content: '○';
  left: 26px;
  background: var(--green);
}

.btn-toggle-submit {
  margin-top: 0.75rem;
  padding: 0.85rem;
  border-radius: 8px;
  border: none;
  background: var(--blue);
  color: #0a0a1a;
  font-weight: 700;
  width: 100%;
  cursor: pointer;
}

  /* Responsive */
  @media (max-width: 480px) {
    .game-header { flex-wrap: wrap; gap: 0.5rem; }
    .match-container { grid-template-columns: 1fr; gap: 0.75rem; }
    .match-arrow-col { display: none; }
    .dial-container { gap: 0.3rem; }
    .dial-wheel { width: 48px; height: 140px; }
    .stage-graph { padding: 0 0.5rem; }
    .ending-stats { gap: 0.75rem; }
    .stat-box { padding: 0.75rem 1rem; }
    .cinematic-text { font-size: 0.95rem; }
    .cinematic-logo { height: 60px; }
    .cinematic-skip { top: 1rem; right: 1rem; }
    .cinematic-dots { bottom: 1.5rem; }
    .hint-panel { max-height: 60vh; }
    .timer-circle { width: 48px; height: 48px; }
    .timer-circle svg { width: 48px; height: 48px; }

<script>
// ── VISUAL EFFECTS ──
const CONFETTI_COLORS = ['#40E2FF','#f59e0b','#10b981','#a78bfa','#fb923c','#ffffff','#f472b6'];

function spawnConfetti(count = 30) {
  for (let i = 0; i < count; i++) {
    const p = document.createElement('div');
    const color = CONFETTI_COLORS[Math.floor(Math.random() * CONFETTI_COLORS.length)];
    const size = Math.random() * 9 + 5;
    const x = Math.random() * 100;
    const dur = (Math.random() * 1.2 + 0.8).toFixed(2);
    const delay = (Math.random() * 0.4).toFixed(2);
    const shape = Math.random() > 0.5 ? '50%' : '2px';
    p.style.cssText = `
      position:fixed;left:${x}vw;top:-20px;
      width:${size}px;height:${size}px;
      background:${color};border-radius:${shape};
      pointer-events:none;z-index:9999;
      animation:confettiFall ${dur}s ${delay}s ease-in forwards;
    `;
    document.body.appendChild(p);
    setTimeout(() => p.remove(), (parseFloat(dur) + parseFloat(delay) + 0.15) * 1000);
  }
}

function shakeElement(el) {
  if (!el) return;
  el.classList.remove('shake-anim');
  void el.offsetWidth; // reflow
  el.classList.add('shake-anim');
  el.addEventListener('animationend', () => el.classList.remove('shake-anim'), { once: true });
}

let typingTimer = null;
function typeText(el, text, speed = 14) {
  if (typingTimer) clearTimeout(typingTimer);
  el.textContent = '';
  let i = 0;
  function next() {
    if (i < text.length) {
      el.textContent += text[i++];
      typingTimer = setTimeout(next, speed);
    }
  }
  next();
  // 클릭하면 즉시 완성
  el.style.cursor = 'pointer';
  el.onclick = () => {
    if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }
    el.textContent = text;
    el.style.cursor = '';
    el.onclick = null;
  };
}

// ── PARALLAX ──
function initParallax() {
  const bg = document.getElementById('bg-layer');

  document.addEventListener('mousemove', (e) => {
    if (!gameStarted) return;
    const x = (e.clientX / window.innerWidth - 0.5) * 20;
    const y = (e.clientY / window.innerHeight - 0.5) * 10;
    bg.style.backgroundPosition = `calc(50% + ${x}px) calc(50% + ${y}px)`;
  });

  if (window.DeviceOrientationEvent) {
    window.addEventListener('deviceorientation', (e) => {
      if (!gameStarted) return;
      const x = (e.gamma || 0) * 0.5;
      const y = (e.beta || 0) * 0.3;
      bg.style.backgroundPosition = `calc(50% + ${x}px) calc(50% + ${y}px)`;
    });
  }
}

// ── ENHANCED FEEDBACK ──
function screenFlash(color) {
  const game = document.getElementById('game');
  const cls = color === 'green' ? 'screen-green-flash' : 'screen-red-flash';
  game.classList.remove(cls);
  void game.offsetWidth;
  game.classList.add(cls);
  game.addEventListener('animationend', () => game.classList.remove(cls), { once: true });

  if (color === 'red' && navigator.vibrate) {
    navigator.vibrate([50, 30, 50]);
  } else if (color === 'green' && navigator.vibrate) {
    navigator.vibrate(30);
  }
}

function showDiscovery(text) {
  const popup = document.createElement('div');
  popup.className = 'discovery-popup';
  popup.innerHTML = `
    <div class="discovery-icon">🔍</div>
    <div class="discovery-text">${text}</div>
  `;
  document.body.appendChild(popup);

  for (let i = 0; i < 12; i++) {
    const s = document.createElement('div');
    s.className = 'sparkle';
    const angle = (i / 12) * Math.PI * 2;
    const dist = 40 + Math.random() * 30;
    s.style.cssText = `
      left: 50%; top: 50%;
      --tx: ${Math.cos(angle) * dist}px;
      --ty: ${Math.sin(angle) * dist}px;
      animation-delay: ${Math.random() * 0.2}s;
    `;
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 1000);
  }

  setTimeout(() => {
    popup.style.animation = 'popOut 0.3s ease forwards';
    setTimeout(() => popup.remove(), 300);
  }, 1200);
}

// ── HINT SYSTEM ──
let hintState = {};
let totalHintsUsed = 0;
let hintPanelOpen = false;

function getHintKey() {
  return `${currentStage}-${currentQuiz}`;
}

function toggleHintPanel() {
  hintPanelOpen = !hintPanelOpen;
  document.getElementById('hintPanel').classList.toggle('open', hintPanelOpen);
  if (hintPanelOpen) renderHints();
}

function renderHints() {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  if (!quiz.hints) {
    document.getElementById('hintList').innerHTML = '<p style="color:var(--muted)">이 문제에는 힌트가 없습니다.</p>';
    return;
  }

  const key = getHintKey();
  const revealed = hintState[key] || 0;

  document.getElementById('hintList').innerHTML = quiz.hints.map((h, i) => {
    if (i < revealed) {
      return `<div class="hint-item revealed">
        <div>🔓 힌트 ${i + 1}: ${h.text}</div>
      </div>`;
    } else if (i === revealed) {
      const costLabel = h.cost === 0
        ? '<div class="hint-cost free">무료</div>'
        : `<div class="hint-cost paid">-${h.cost}점</div>`;
      return `<div class="hint-item available" onclick="revealHint(${i})">
        <div>🔒 힌트 ${i + 1}을 열려면 클릭하세요</div>
        ${costLabel}
      </div>`;
    } else {
      return `<div class="hint-item locked">
        <div>🔒 힌트 ${i + 1} (이전 힌트를 먼저 열어주세요)</div>
      </div>`;
    }
  }).join('');

  const remaining = quiz.hints.length - revealed;
  const badge = document.getElementById('hintBadge');
  badge.textContent = remaining;
  badge.style.display = remaining > 0 ? 'flex' : 'none';
}

function revealHint(idx) {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  const hint = quiz.hints[idx];
  const key = getHintKey();

  if (hint.cost > 0) {
    score = Math.max(0, score - hint.cost);
    document.getElementById('scoreDisplay').textContent = score;
    showScoreDeduction(hint.cost);
  }

  hintState[key] = idx + 1;
  totalHintsUsed++;
  renderHints();
}

function showScoreDeduction(amount) {
  const el = document.createElement('div');
  el.className = 'score-deduct';
  el.textContent = `-${amount}`;
  const scoreEl = document.getElementById('scoreDisplay');
  const rect = scoreEl.getBoundingClientRect();
  el.style.left = `${rect.left}px`;
  el.style.top = `${rect.top}px`;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 1000);
}

function showHintButton() {
  document.getElementById('hintBtn').classList.add('visible');
}

function hideHintButton() {
  document.getElementById('hintBtn').classList.remove('visible');
  document.getElementById('hintPanel').classList.remove('open');
  hintPanelOpen = false;
}

function startGame() {
  document.getElementById('intro').style.display = 'none';
  const gameEl = document.getElementById('game');
  gameEl.style.display = 'flex';
  gameEl.style.flexDirection = 'column';

  // Build office minimap
  const map = document.getElementById('officeMap');
  map.innerHTML = stages.map((s, i) => {
    const arrow = i > 0 ? `<div class="map-arrow" id="mapArrow${i}">›</div>` : '';
    return `${arrow}<div class="map-room" id="mapRoom${i}"><span class="map-icon">${s.icon}</span><span>${s.title}</span></div>`;
  }).join('');

  // Build overall progress dots
  const overallEl = document.getElementById('overallProgress');
  overallEl.innerHTML = stages.map((_, i) =>
    `<div class="progress-dot" id="progressDot${i}"></div>`
  ).join('');

  stageStats = stages.map(() => ({ correct: 0, total: 0 }));

  startTime = Date.now();
  startTimer();
  addFlicker();
  gameStarted = true;
  showHintButton();
  initParallax();
  loadStage(0);
}

function updateOfficeMap(stageIdx) {
  stages.forEach((_, i) => {
    const room = document.getElementById(`mapRoom${i}`);
    const arrow = document.getElementById(`mapArrow${i}`);
    if (!room) return;
    room.className = 'map-room';
    if (i < stageIdx) room.classList.add('visited');
    else if (i === stageIdx) room.classList.add('current');
    if (arrow) arrow.className = `map-arrow${i <= stageIdx ? ' passed' : ''}`;
  });

  // Update overall progress dots
  stages.forEach((_, i) => {
    const dot = document.getElementById(`progressDot${i}`);
    if (!dot) return;
    dot.className = 'progress-dot';
    if (i < stageIdx) dot.classList.add('completed');
    else if (i === stageIdx) dot.classList.add('current');
  });
}

function addFlicker() {
  const el = document.createElement('div');
  el.className = 'room-flicker';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 700);
}

function startTimer() {
  timerInterval = setInterval(() => {
    secondsLeft--;
    updateTimer();
    if (secondsLeft <= 0) {
      clearInterval(timerInterval);
      showEnding(true);
    }
  }, 1000);
}

function updateTimer() {
  const m = Math.floor(secondsLeft / 60);
  const s = secondsLeft % 60;
  const display = document.getElementById('timerDisplay');
  display.textContent = `${m}:${s.toString().padStart(2, '0')}`;

  // Update circular progress
  const circumference = 2 * Math.PI * 24; // ~150.8
  const pct = secondsLeft / 600;
  const offset = circumference * (1 - pct);
  const progress = document.getElementById('timerProgress');
  progress.style.strokeDashoffset = offset;

  progress.classList.remove('warning', 'danger');
  if (secondsLeft <= 120) progress.classList.add('danger');
  else if (secondsLeft <= 180) progress.classList.add('warning');

  // Tension messages
  tensionMessages.forEach(msg => {
    if (secondsLeft === msg.at && !shownTension.has(msg.at)) {
      shownTension.add(msg.at);
      showTensionText(msg.text);
    }
  });

  // Darken background as time runs low
  if (secondsLeft <= 180) {
    const darkPct = Math.max(0, (180 - secondsLeft) / 180) * 0.3;
    document.getElementById('bg-layer').style.opacity = 1 - darkPct;
  }

  // Add vignette at 60s
  if (secondsLeft === 60 && !document.getElementById('vignetteOverlay')) {
    const vig = document.createElement('div');
    vig.className = 'vignette-overlay';
    vig.id = 'vignetteOverlay';
    document.body.appendChild(vig);
  }
}

// ── CINEMATIC ENGINE ──
let cinematicActive = false;
let cinematicCleanup = null;

function playCinematic(scenes, callback, options = {}) {
  if (cinematicActive) return;
  cinematicActive = true;

  const overlay = document.createElement('div');
  overlay.className = 'cinematic-overlay';

  // Skip button
  const skipBtn = document.createElement('button');
  skipBtn.className = 'cinematic-skip';
  skipBtn.textContent = '건너뛰기 >>';
  overlay.appendChild(skipBtn);

  // Progress dots
  const dots = document.createElement('div');
  dots.className = 'cinematic-dots';
  scenes.forEach((_, i) => {
    const dot = document.createElement('div');
    dot.className = 'cinematic-dot' + (i === 0 ? ' active' : '');
    dots.appendChild(dot);
  });
  overlay.appendChild(dots);

  document.body.appendChild(overlay);

  let currentScene = 0;
  let sceneTimeout = null;
  let particlesCtx = null;
  let particlesAnim = null;
  let particles = [];

  function updateDots(idx) {
    const allDots = dots.querySelectorAll('.cinematic-dot');
    allDots.forEach((d, i) => {
      d.className = 'cinematic-dot';
      if (i < idx) d.classList.add('done');
      else if (i === idx) d.classList.add('active');
    });
  }

  function createParticles(container) {
    const canvas = document.createElement('canvas');
    canvas.className = 'cinematic-particles';
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    container.appendChild(canvas);
    particlesCtx = canvas.getContext('2d');
    particles = [];
    for (let i = 0; i < 25; i++) {
      particles.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 2 + 0.5,
        dx: (Math.random() - 0.5) * 0.5,
        dy: (Math.random() - 0.5) * 0.3 - 0.2,
        alpha: Math.random() * 0.5 + 0.2
      });
    }
    function animParticles() {
      particlesCtx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach(p => {
        p.x += p.dx;
        p.y += p.dy;
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        if (p.y < 0) p.y = canvas.height;
        if (p.y > canvas.height) p.y = 0;
        particlesCtx.beginPath();
        particlesCtx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        particlesCtx.fillStyle = `rgba(64, 226, 255, ${p.alpha})`;
        particlesCtx.fill();
      });
      particlesAnim = requestAnimationFrame(animParticles);
    }
    animParticles();
  }

  function applyTextEffect(container, text, effect, speed) {
    if (effect === 'fadeLines') {
      const lines = text.split('\n').filter(l => l.trim());
      container.innerHTML = '';
      lines.forEach((line, i) => {
        const lineEl = document.createElement('div');
        lineEl.className = 'cinematic-text-line';
        lineEl.textContent = line;
        container.appendChild(lineEl);
        setTimeout(() => lineEl.classList.add('visible'), (i + 1) * 400);
      });
    } else if (effect === 'reveal') {
      container.style.clipPath = 'inset(0 100% 0 0)';
      container.textContent = text;
      container.style.opacity = '1';
      container.style.transition = 'clip-path 1.2s ease';
      requestAnimationFrame(() => {
        container.style.clipPath = 'inset(0 0% 0 0)';
      });
    } else {
      // typewriter (default)
      typeText(container, text, speed || 30);
    }
  }

  function getTransitionIn(type) {
    const map = {
      fadeIn: 'cin-fadeIn 0.8s ease forwards',
      slideLeft: 'cin-slideLeft 0.6s ease forwards',
      zoomIn: 'cin-zoomIn 0.8s ease forwards',
      blur: 'cin-blur 1s ease forwards',
      glitch: 'cin-glitch 0.8s ease forwards'
    };
    return map[type] || map.fadeIn;
  }

  function getTransitionOut(type) {
    const map = {
      fadeIn: 'cin-fadeOut 0.5s ease forwards',
      slideLeft: 'cin-slideLeftOut 0.5s ease forwards',
      zoomIn: 'cin-zoomInOut 0.5s ease forwards',
      blur: 'cin-blurOut 0.5s ease forwards',
      glitch: 'cin-fadeOut 0.4s ease forwards'
    };
    return map[type] || map.fadeIn;
  }

  function showScene(idx) {
    if (idx >= scenes.length) {
      closeCinematic();
      return;
    }

    currentScene = idx;
    updateDots(idx);

    const scene = scenes[idx];
    const sceneEl = document.createElement('div');
    sceneEl.className = 'cinematic-scene';

    // Background
    if (scene.bg) {
      const bg = document.createElement('div');
      bg.className = 'cinematic-bg';
      if (scene.bg.startsWith('http') || scene.bg.startsWith('/') || scene.bg.startsWith('.')) {
        bg.style.backgroundImage = `url('${scene.bg}')`;
      } else {
        bg.style.background = scene.bg;
      }
      sceneEl.appendChild(bg);

      // Dark overlay
      const bgOverlay = document.createElement('div');
      bgOverlay.className = 'cinematic-bg-overlay ' + (scene.overlay || 'dark');
      sceneEl.appendChild(bgOverlay);
    }

    // Vignette
    if (!scene.effects || scene.effects.includes('vignette')) {
      const vig = document.createElement('div');
      vig.className = 'cinematic-vignette';
      sceneEl.appendChild(vig);
    }

    // Particles
    if (scene.effects && scene.effects.includes('particles')) {
      createParticles(sceneEl);
    }

    // Content
    const content = document.createElement('div');
    content.className = 'cinematic-content';

    // Custom HTML content (for intro scenes with logo, buttons, etc.)
    if (scene.html) {
      content.innerHTML = scene.html;
      sceneEl.appendChild(content);
      overlay.appendChild(sceneEl);
      sceneEl.style.animation = getTransitionIn(scene.transition);

      // Initialize elements within custom HTML
      if (scene.onMount) {
        setTimeout(() => scene.onMount(content, overlay), 100);
      }

      // No auto-advance for interactive scenes (like start button)
      if (scene.interactive) return;
    } else if (scene.text) {
      const textEl = document.createElement('div');
      textEl.className = 'cinematic-text';
      content.appendChild(textEl);
      sceneEl.appendChild(content);
      overlay.appendChild(sceneEl);
      sceneEl.style.animation = getTransitionIn(scene.transition);

      // Apply text effect
      setTimeout(() => {
        applyTextEffect(textEl, scene.text, scene.textEffect, scene.textSpeed);
      }, 300);
    } else {
      sceneEl.appendChild(content);
      overlay.appendChild(sceneEl);
      sceneEl.style.animation = getTransitionIn(scene.transition);
    }

    // Shake effect
    if (scene.effects && scene.effects.includes('shake')) {
      setTimeout(() => {
        sceneEl.style.animation = 'cin-shake 0.5s ease';
        setTimeout(() => {
          sceneEl.style.animation = '';
          sceneEl.style.opacity = '1';
        }, 500);
      }, scene.shakeDelay || 1500);
    }

    // Auto-advance
    const duration = scene.duration || 3500;
    sceneTimeout = setTimeout(() => {
      advanceScene(sceneEl, scene);
    }, duration);
  }

  function advanceScene(sceneEl, scene) {
    if (sceneTimeout) { clearTimeout(sceneTimeout); sceneTimeout = null; }
    if (particlesAnim) { cancelAnimationFrame(particlesAnim); particlesAnim = null; }

    sceneEl.style.animation = getTransitionOut(scene.transition);
    setTimeout(() => {
      sceneEl.remove();
      showScene(currentScene + 1);
    }, 500);
  }

  function closeCinematic() {
    if (!cinematicActive) return;
    cinematicActive = false;
    if (sceneTimeout) { clearTimeout(sceneTimeout); sceneTimeout = null; }
    if (particlesAnim) { cancelAnimationFrame(particlesAnim); particlesAnim = null; }
    if (typingTimer) { clearTimeout(typingTimer); typingTimer = null; }

    overlay.style.animation = 'cin-fadeOut 0.5s ease forwards';
    setTimeout(() => {
      overlay.remove();
      if (callback) callback();
    }, 500);
  }

  // Skip button
  skipBtn.onclick = closeCinematic;

  // Click/tap to advance scene
  overlay.addEventListener('click', (e) => {
    if (e.target === skipBtn || e.target.closest('.cinematic-skip')) return;
    if (e.target.closest('.btn-start') || e.target.closest('.cinematic-stage-icon')) return;

    const currentSceneEl = overlay.querySelector('.cinematic-scene');
    if (currentSceneEl && currentScene < scenes.length) {
      const scene = scenes[currentScene];
      if (scene.interactive) return;
      advanceScene(currentSceneEl, scene);
    }
  });

  cinematicCleanup = closeCinematic;

  // Start first scene
  showScene(0);
}

// Legacy wrapper for backward compatibility
function showCutscene(text, callback) {
  const scenes = [{
    text: text,
    transition: 'fadeIn',
    duration: Math.max(text.length * 35 + 2000, 5000),
    textEffect: 'typewriter',
    overlay: 'dark'
  }];
  playCinematic(scenes, callback);
}

// ── STAGE ──
function loadStage(stageIdx, animate) {
  const sc = document.getElementById('stageContent');

  const doLoad = () => {
    currentStage = stageIdx;
    currentQuiz = 0;
    const stage = stages[stageIdx];

    updateOfficeMap(stageIdx);

    document.getElementById('bg-layer').style.backgroundImage = `url('${stage.bg}')`;

    document.getElementById('roomIcon').textContent = stage.icon;
    document.getElementById('roomTitle').textContent = stage.title;
    document.getElementById('roomLocation').textContent = stage.location;
    typeText(document.getElementById('roomStory'), stage.story, 14);
    document.getElementById('roomHint').textContent = stage.hint;

    document.getElementById('stageClear').classList.remove('visible');
    document.getElementById('quizCard').style.display = 'block';

    loadQuiz(stageIdx, 0);

    sc.classList.remove('stage-zoom-in', 'stage-leaving');
    sc.classList.add('stage-zoom-out');
    setTimeout(() => sc.classList.remove('stage-zoom-out'), 550);
  };

  if (animate) {
    sc.classList.add('stage-zoom-in');
    setTimeout(doLoad, 420);
  } else {
    doLoad();
  }
}

// ── QUIZ ──
function loadQuiz(stageIdx, quizIdx) {
  const stage = stages[stageIdx];
  const quiz = stage.quizzes[quizIdx];

  const total = stage.quizzes.length;
  const pct = (quizIdx / total) * 100;

  document.getElementById('quizProgressText').textContent = `문제 ${quizIdx + 1} / ${total}`;
  document.getElementById('quizProgressFill').style.width = `${pct}%`;

  // Badge
  const badgeEl = document.getElementById('quizTypeBadge');
  let badgeClass = 'badge-ox';
  if (quiz.type === 'choice') badgeClass = 'badge-choice';
  else if (quiz.type === 'fill') badgeClass = 'badge-fill';
  else if (quiz.type === 'scenario') badgeClass = 'badge-scenario';
  badgeEl.innerHTML = `<span class="quiz-type-badge ${badgeClass}">${quiz.badge}</span>`;

  document.getElementById('quizQuestion').textContent = quiz.question;

  // Answer area
  const area = document.getElementById('quizAnswerArea');
  area.innerHTML = '';

  if (quiz.type === 'ox') {
    area.innerHTML = `
      <div class="ox-buttons">
        <button class="ox-btn" id="oxO" onclick="answerOX(true)">⭕</button>
        <button class="ox-btn" id="oxX" onclick="answerOX(false)">❌</button>
      </div>`;
  } else if (quiz.type === 'choice' || quiz.type === 'scenario') {
    const opts = quiz.options.map((opt, i) =>
      `<button class="option-btn" id="opt${i}" onclick="answerChoice(${i})">${opt}</button>`
    ).join('');
    area.innerHTML = `<div class="options-list">${opts}</div>`;
  } else if (quiz.type === 'fill') {
    area.innerHTML = `
      ${quiz.hint ? `<div style="font-size:0.8rem;color:var(--muted);margin-bottom:0.5rem;">힌트: ${quiz.hint}</div>` : ''}
      <div class="fill-wrap">
        <input class="fill-input" id="fillInput" type="text" placeholder="정답 입력..."
               onkeydown="if(event.key==='Enter')answerFill()">
        <button class="btn-submit" id="fillSubmit" onclick="answerFill()">확인</button>
      </div>`;
    setTimeout(() => document.getElementById('fillInput')?.focus(), 100);
  }

  else if (quiz.type === 'match') {
    const shuffledRight = [...quiz.pairs].sort(() => Math.random() - 0.5);
    area.innerHTML = `
      <div class="match-container">
        <div class="match-column" id="matchLeft">
          ${quiz.pairs.map((p, i) => `<div class="match-item" data-idx="${i}">${p.left}</div>`).join('')}
        </div>
        <div class="match-arrow-col">
          ${quiz.pairs.map(() => '<div class="match-arrow">→</div>').join('')}
        </div>
        <div class="match-column" id="matchRight">
          ${shuffledRight.map((p, i) => `<div class="match-slot" data-slot="${i}" data-answer="${quiz.pairs.indexOf(p)}">${p.right}</div>`).join('')}
        </div>
        <button class="btn-match-submit" onclick="answerMatch()">확인</button>
      </div>`;
    initMatchDrag();
  }

  else if (quiz.type === 'order') {
    const shuffled = quiz.items.map((text, i) => ({ text, correctIdx: i }))
      .sort(() => Math.random() - 0.5);
    area.innerHTML = `
      <div class="order-list" id="orderList">
        ${shuffled.map((item, i) => `<div class="order-item" draggable="true" data-correct="${item.correctIdx}">
          <div class="order-number">${i + 1}</div>
          <div class="order-text">${item.text}</div>
        </div>`).join('')}
      </div>
      <button class="btn-order-submit" onclick="answerOrder()">확인</button>`;
    initOrderDrag();
  }

  else if (quiz.type === 'dial') {
    const chars = quiz.charset || 'ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎ';
    const dialCount = quiz.answer.length;
    area.innerHTML = `
      <div class="dial-container" id="dialContainer">
        ${Array.from({ length: dialCount }, (_, i) => `
          <div class="dial-col">
            <button class="dial-arrow" onclick="dialSpin(${i}, -1)">▲</button>
            <div class="dial-wheel" id="dialWheel${i}" data-idx="${i}" data-pos="0">
              <div class="dial-indicator"></div>
              <div class="dial-track" id="dialTrack${i}">
                ${chars.split('').map((c, ci) => `<div class="dial-char${ci === 0 ? ' active' : ''}">${c}</div>`).join('')}
              </div>
            </div>
            <button class="dial-arrow" onclick="dialSpin(${i}, 1)">▼</button>
          </div>
        `).join('')}
      </div>
      <button class="btn-dial-submit" onclick="answerDial()">확인</button>`;
    initDialTouch();
  }

  else if (quiz.type === 'toggle') {
    area.innerHTML = `
      <div class="toggle-list">
        ${quiz.statements.map((s, i) => `
          <div class="toggle-row">
            <div class="toggle-text">${s.text}</div>
            <button class="toggle-switch" id="toggle${i}" data-idx="${i}" data-on="false" onclick="toggleSwitch(${i})"></button>
          </div>
        `).join('')}
      </div>
      <button class="btn-toggle-submit" onclick="answerToggle()">확인</button>`;
  }

  // Reset feedback
  const fb = document.getElementById('quizFeedback');
  fb.className = 'feedback';
  fb.textContent = '';

  document.getElementById('btnNext').className = 'btn-next';
  document.getElementById('btnRetry').className = 'btn-retry';

  showHintButton();
  renderHints();
}

function showFeedback(isCorrect, message, quizIdx, stageIdx) {
  totalAttempts++;
  stageStats[stageIdx].total++;
  if (isCorrect) stageStats[stageIdx].correct++;
  if (isCorrect) {
    totalCorrect++;
    score += 100;
    document.getElementById('scoreDisplay').textContent = score;
    screenFlash('green');
  } else {
    screenFlash('red');
  }

  const fb = document.getElementById('quizFeedback');
  fb.className = `feedback ${isCorrect ? 'correct' : 'wrong'}`;
  fb.textContent = message;

  if (isCorrect) {
    const qc = document.getElementById('quizCard');
    qc.classList.remove('correct-flash');
    void qc.offsetWidth;
    qc.classList.add('correct-flash');
    qc.addEventListener('animationend', () => qc.classList.remove('correct-flash'), { once: true });

    const btnNext = document.getElementById('btnNext');
    const stage = stages[stageIdx];
    const isLast = quizIdx >= stage.quizzes.length - 1;
    btnNext.className = 'btn-next visible';
    btnNext.textContent = isLast ? '완료 →' : '다음 문제 →';
    document.getElementById('btnRetry').className = 'btn-retry';
  } else {
    shakeElement(document.getElementById('quizCard'));
    document.getElementById('btnRetry').className = 'btn-retry visible';
    document.getElementById('btnNext').className = 'btn-next';
  }
}

function retryQuiz() {
  loadQuiz(currentStage, currentQuiz);
}

function answerOX(value) {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  const isCorrect = value === quiz.answer;

  // Style buttons
  const btnO = document.getElementById('oxO');
  const btnX = document.getElementById('oxX');
  btnO.disabled = btnX.disabled = true;

  if (value === true) {
    btnO.className = `ox-btn ${isCorrect ? 'selected-correct' : 'selected-wrong'}`;
    if (!isCorrect) btnX.className = 'ox-btn selected-correct';
  } else {
    btnX.className = `ox-btn ${isCorrect ? 'selected-correct' : 'selected-wrong'}`;
    if (!isCorrect) btnO.className = 'ox-btn selected-correct';
  }

  showFeedback(isCorrect,
    isCorrect ? quiz.feedbackCorrect : quiz.feedbackWrong,
    currentQuiz, currentStage);
}

function answerChoice(idx) {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  const isCorrect = idx === quiz.answer;

  quiz.options.forEach((_, i) => {
    const btn = document.getElementById(`opt${i}`);
    btn.disabled = true;
    if (i === idx) btn.className = `option-btn ${isCorrect ? 'correct' : 'wrong'}`;
  });

  showFeedback(isCorrect,
    isCorrect ? quiz.feedbackCorrect : quiz.feedbackWrong,
    currentQuiz, currentStage);
}

function answerFill() {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  const input = document.getElementById('fillInput');
  const val = input.value.trim().toLowerCase();
  const isCorrect = val === quiz.answer.toLowerCase() ||
    (quiz.displayAnswer && val === quiz.displayAnswer.toLowerCase());

  input.disabled = true;
  document.getElementById('fillSubmit').disabled = true;
  input.className = `fill-input ${isCorrect ? 'correct' : 'wrong'}`;

  showFeedback(isCorrect,
    isCorrect ? quiz.feedbackCorrect : quiz.feedbackWrong,
    currentQuiz, currentStage);
}

// ── MATCH PUZZLE ──
function initMatchDrag() {
  const items = document.querySelectorAll('#matchLeft .match-item');
  const slots = document.querySelectorAll('#matchRight .match-slot');
  let dragItem = null;

  items.forEach(item => {
    item.draggable = true;
    item.addEventListener('dragstart', (e) => {
      dragItem = item;
      item.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      dragItem = null;
    });
    item.addEventListener('touchstart', (e) => {
      dragItem = item;
      item.classList.add('dragging');
    });
  });

  slots.forEach(slot => {
    slot.addEventListener('dragover', (e) => { e.preventDefault(); slot.classList.add('drag-over'); });
    slot.addEventListener('dragleave', () => slot.classList.remove('drag-over'));
    slot.addEventListener('drop', (e) => {
      e.preventDefault();
      slot.classList.remove('drag-over');
      if (dragItem) {
        slot.textContent = dragItem.textContent;
        slot.dataset.matched = dragItem.dataset.idx;
        slot.classList.add('filled');
        dragItem.style.opacity = '0.4';
        dragItem.draggable = false;
      }
    });
    slot.addEventListener('touchend', (e) => {
      if (dragItem) {
        slot.textContent = dragItem.textContent;
        slot.dataset.matched = dragItem.dataset.idx;
        slot.classList.add('filled');
        dragItem.style.opacity = '0.4';
        dragItem.classList.remove('dragging');
        dragItem.draggable = false;
        dragItem = null;
      }
    });
  });
}

function answerMatch() {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  const slots = document.querySelectorAll('#matchRight .match-slot');
  let allCorrect = true;
  let allFilled = true;

  slots.forEach((slot, i) => {
    if (!slot.dataset.matched) { allFilled = false; return; }
    const matchedIdx = parseInt(slot.dataset.matched);
    const answerIdx = parseInt(slot.dataset.answer);
    if (matchedIdx === answerIdx) {
      slot.classList.add('matched-correct');
    } else {
      slot.classList.add('matched-wrong');
      allCorrect = false;
    }
  });

  if (!allFilled) return;

  showFeedback(allCorrect,
    allCorrect ? quiz.feedbackCorrect : quiz.feedbackWrong,
    currentQuiz, currentStage);
}

// ── ORDER PUZZLE ──
function initOrderDrag() {
  const list = document.getElementById('orderList');
  let dragEl = null;

  list.querySelectorAll('.order-item').forEach(item => {
    item.draggable = true;
    item.addEventListener('dragstart', (e) => {
      dragEl = item;
      item.classList.add('dragging');
    });
    item.addEventListener('dragend', () => {
      item.classList.remove('dragging');
      updateOrderNumbers();
    });
    item.addEventListener('dragover', (e) => {
      e.preventDefault();
      if (item === dragEl) return;
      const rect = item.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      if (e.clientY < mid) {
        list.insertBefore(dragEl, item);
      } else {
        list.insertBefore(dragEl, item.nextSibling);
      }
    });

    let touchY = 0;
    item.addEventListener('touchstart', (e) => {
      dragEl = item;
      touchY = e.touches[0].clientY;
      item.classList.add('dragging');
    });
    item.addEventListener('touchmove', (e) => {
      e.preventDefault();
      const curY = e.touches[0].clientY;
      const items = [...list.querySelectorAll('.order-item')];
      for (const other of items) {
        if (other === dragEl) continue;
        const rect = other.getBoundingClientRect();
        if (curY > rect.top && curY < rect.bottom) {
          const mid = rect.top + rect.height / 2;
          if (curY < mid) list.insertBefore(dragEl, other);
          else list.insertBefore(dragEl, other.nextSibling);
          break;
        }
      }
    });
    item.addEventListener('touchend', () => {
      item.classList.remove('dragging');
      updateOrderNumbers();
    });
  });
}

function updateOrderNumbers() {
  document.querySelectorAll('#orderList .order-item').forEach((item, i) => {
    item.querySelector('.order-number').textContent = i + 1;
  });
}

function answerOrder() {
  const items = document.querySelectorAll('#orderList .order-item');
  let allCorrect = true;
  items.forEach((item, i) => {
    const correct = parseInt(item.dataset.correct);
    if (correct !== i) allCorrect = false;
  });

  const quiz = stages[currentStage].quizzes[currentQuiz];
  showFeedback(allCorrect,
    allCorrect ? quiz.feedbackCorrect : quiz.feedbackWrong,
    currentQuiz, currentStage);
}

// ── DIAL PUZZLE ──
let dialPositions = [];

function initDialTouch() {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  dialPositions = new Array(quiz.answer.length).fill(0);
}

function dialSpin(wheelIdx, direction) {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  const chars = quiz.charset || 'ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎ';
  const len = chars.length;

  dialPositions[wheelIdx] = (dialPositions[wheelIdx] + direction + len) % len;
  const pos = dialPositions[wheelIdx];

  const track = document.getElementById(`dialTrack${wheelIdx}`);
  track.style.transform = `translateY(-${pos * 40}px)`;

  track.querySelectorAll('.dial-char').forEach((ch, i) => {
    ch.classList.toggle('active', i === pos);
  });
}

function answerDial() {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  const chars = quiz.charset || 'ㄱㄴㄷㄹㅁㅂㅅㅇㅈㅊㅋㅌㅍㅎ';

  const userAnswer = dialPositions.map(pos => chars[pos]).join('');
  const isCorrect = userAnswer === quiz.answer;

  showFeedback(isCorrect,
    isCorrect ? quiz.feedbackCorrect : quiz.feedbackWrong,
    currentQuiz, currentStage);
}

// ── TOGGLE PUZZLE ──
function toggleSwitch(idx) {
  const btn = document.getElementById(`toggle${idx}`);
  const isOn = btn.dataset.on === 'true';
  btn.dataset.on = (!isOn).toString();
  btn.classList.toggle('on', !isOn);
}

function answerToggle() {
  const quiz = stages[currentStage].quizzes[currentQuiz];
  let allCorrect = true;
  quiz.statements.forEach((s, i) => {
    const btn = document.getElementById(`toggle${i}`);
    const userAnswer = btn.dataset.on === 'true';
    if (userAnswer !== s.correct) allCorrect = false;
  });

  showFeedback(allCorrect,
    allCorrect ? quiz.feedbackCorrect : quiz.feedbackWrong,
    currentQuiz, currentStage);
}

function nextQuiz() {
  const stage = stages[currentStage];
  const nextQuizIdx = currentQuiz + 1;

  if (nextQuizIdx >= stage.quizzes.length) {
    showStageClear();
  } else {
    currentQuiz = nextQuizIdx;
    loadQuiz(currentStage, currentQuiz);
  }
}

function showStageClear() {
  const stage = stages[currentStage];
  document.getElementById('quizCard').style.display = 'none';
  hideHintButton();

  // 마지막 스테이지는 "탈출 성공!", 나머지는 "단서 발견!"
  const isLastStage = currentStage >= stages.length - 1;
  if (!isLastStage) {
    showDiscovery('단서 발견!');
  }

  setTimeout(() => {
    const clearEl = document.getElementById('stageClear');
    clearEl.classList.add('visible');
    clearEl.classList.add('unlock-anim');
    clearEl.addEventListener('animationend', () => clearEl.classList.remove('unlock-anim'), { once: true });

    document.getElementById('clearMessage').textContent = stage.clearMessage;

    const hintEl = document.getElementById('clearHint');
    if (stage.nextHint) {
      hintEl.textContent = stage.nextHint;
      hintEl.style.display = 'block';
    } else {
      hintEl.style.display = 'none';
    }

    const btnNext = document.getElementById('btnNextStage');
    btnNext.textContent = currentStage >= stages.length - 1 ? '🎉 탈출!' : '다음 단계로 →';
  }, 1400);
}

function nextStage() {
  if (currentStage >= stages.length - 1) {
    showEnding(false);
    return;
  }

  const nextIdx = currentStage + 1;
  const nextScenes = stages[nextIdx].cutsceneScenes;

  if (nextScenes) {
    playCinematic(nextScenes, () => {
      addFlicker();
      setTimeout(() => {
        loadStage(nextIdx, true);
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }, 150);
    });
  } else {
    addFlicker();
    setTimeout(() => {
      loadStage(nextIdx, true);
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }, 150);
  }
}

function showEnding(timeout) {
  clearInterval(timerInterval);
  hideHintButton();

  document.getElementById('vignetteOverlay')?.remove();
  document.getElementById('bg-layer').style.opacity = 1;

  document.getElementById('game').style.display = 'none';
  const endingEl = document.getElementById('ending');
  endingEl.style.display = 'flex';

  const elapsed = Math.floor((Date.now() - startTime) / 1000);
  const em = Math.floor(elapsed / 60);
  const es = elapsed % 60;
  document.getElementById('endTime').textContent = `${em}분 ${es}초`;
  document.getElementById('endScore').textContent = score + '점';
  const pct = totalAttempts > 0 ? Math.round((totalCorrect / totalAttempts) * 100) : 0;
  document.getElementById('endCorrect').textContent = `${pct}%`;
  document.getElementById('endHints').textContent = `${totalHintsUsed}회`;

  let grade = 'C';
  if (pct >= 95 && totalHintsUsed === 0 && elapsed <= 300) grade = 'S';
  else if (pct >= 80 && totalHintsUsed <= 3) grade = 'A';
  else if (pct >= 60) grade = 'B';

  const gradeBadge = document.getElementById('gradeBadge');
  gradeBadge.textContent = grade;
  gradeBadge.className = `grade-badge grade-${grade}`;

  const graphEl = document.getElementById('stageGraph');
  graphEl.innerHTML = stageStats.map((s, i) => {
    const stagePct = s.total > 0 ? Math.round((s.correct / s.total) * 100) : 0;
    return `<div class="stage-bar-row">
      <div class="stage-bar-label">${stages[i].icon} ${stages[i].title}</div>
      <div class="stage-bar-track"><div class="stage-bar-fill" style="width:0%;" data-pct="${stagePct}"></div></div>
      <div class="stage-bar-pct">${stagePct}%</div>
    </div>`;
  }).join('');

  setTimeout(() => {
    graphEl.querySelectorAll('.stage-bar-fill').forEach(bar => {
      bar.style.width = bar.dataset.pct + '%';
    });
  }, 100);

  const badgesEl = document.getElementById('specialBadges');
  let badges = [];
  if (totalHintsUsed === 0) badges.push('<span class="special-badge badge-solo">🏆 독립 탈출</span>');
  badgesEl.innerHTML = badges.join('');

  if (timeout) {
    document.getElementById('endTitle').textContent = '시간 초과!';
    gradeBadge.textContent = '⏰';
    gradeBadge.className = 'grade-badge grade-C';
    document.getElementById('endSub').textContent = '아쉽지만 다시 도전해보세요';
    document.getElementById('endSub').style.color = '#f59e0b';
    document.getElementById('epilogue').innerHTML = '시간이 다 되어 사무실 보안 시스템이 작동했습니다.<br><br>하지만 걱정 마세요 — 내일 다시 도전할 수 있습니다.<br><br><strong style="color:#e2e8f0;">"포기하지 않는 것이 엑셈인의 첫 번째 자질입니다."</strong>';
  }

  spawnConfetti(80);
}

function restartGame() {
  hintState = {};
  totalHintsUsed = 0;
  hintPanelOpen = false;
  shownTension = new Set();
  dialPositions = [];
  document.getElementById('vignetteOverlay')?.remove();
  document.getElementById('bg-layer').style.opacity = 1;
  location.reload();
}
</script>

  <span class="hint-badge" id="hintBadge">3</span>

  </div>

</div>
